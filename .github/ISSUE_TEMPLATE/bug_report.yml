name: Bug Report
description: File a bug report
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: vzglyd-slide version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
